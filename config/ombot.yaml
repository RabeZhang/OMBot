app:
  name: OMBot
  env: development
  host_id: local-dev

agent:
  max_context_messages: 30
  auto_summary_threshold: 24
  system_prompt_template: "config/prompts/system.txt"
  workspace_files:
    - "workspace/RUNBOOK.md"
    - "workspace/HOST_PROFILE.md"
    - "workspace/TOOLS.md"

gateway:
  mode: embedded
  local_cli_enabled: true
  approval_timeout_sec: 300

logging:
  level: info
  pretty: true

# 命令执行环境配置
execution:
  # mode: host | docker
  # host - 在 OMBot 进程所在环境执行（默认）
  # docker - 在指定容器中执行（需预先创建）
  mode: host
  # docker 模式配置（mode: docker 时生效）
  # docker_container: "ombot-sandbox"
  # docker_options:
  #   workdir: "/workspace"

events:
  enabled: false
  dir: "./workspace/events"
  default_timezone: "Asia/Shanghai"
  max_queued_per_session: 5
  startup_scan: true

paths:
  data_dir: "./data"
  workspace_dir: "./workspace"
  transcripts_dir: "./data/sessions"
  audit_db_path: "./data/audit/audit.db"
